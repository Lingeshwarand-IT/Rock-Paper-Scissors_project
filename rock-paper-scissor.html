<body>

<h1>Rock Paper Scissors</h1>

<div class="Button">


<button onclick="playGame('Rock')"><h1>👊</h1></button><p>Rock</p>


<button onclick="playGame('Paper')"><h1>👋</h1></button><p>Paper</p>


<button onclick="playGame('Scissors')"><h1>✌️</h1></button><p>Scissors</p>

</div>



<script>

function playGame(playerMove){   

    console.log("Player move is:", playerMove); 

    const randomNumber = Math.random();
    let computerMove = '';

    if(randomNumber >= 0 && randomNumber < 1/3){
        computerMove = 'Rock';
    }
    else if(randomNumber >= 1/3 && randomNumber < 2/3){
        computerMove = 'Paper';
    }
    else{
        computerMove = 'Scissors';
    }

    let result = '';

    if(playerMove === computerMove){
        result = 'Tie';
    }
    else if(
        (playerMove === 'Rock' && computerMove === 'Scissors') ||
        (playerMove === 'Paper' && computerMove === 'Rock') ||
        (playerMove === 'Scissors' && computerMove === 'Paper')
    ){
        result = 'You Win';
    }
    else{
        result = 'You Lose';
    }

    alert("Player: " + playerMove +
          "\nComputer: " + computerMove +
          "\nResult: " + result);
}


</script>
<style>
    .Button{
        display: flex;

    }
    p{
        position: relative;
        top: 120px;
        right: 68px;
        font-size: larger;
    }
    button{
        border-radius: 43px;
        padding: 25px;
    }
    
</style>

</body>
