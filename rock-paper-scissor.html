<body>

<h1 class="head">Rock Paper Scissors</h1>

<h2 id="score">Wins: 0 | Losses: 0 | Ties: 0</h2>
<h3 id="rounds">Remaining Rounds: 12</h3>

<div class="Button">

<button onclick="playGame('Rock')"><h1>👊</h1></button><p>Rock</p>

<button onclick="playGame('Paper')"><h1>👋</h1></button><p>Paper</p>

<button onclick="playGame('Scissors')"><h1>✌️</h1></button><p>Scissors</p>

</div>

<script>

let wins = 0;
let losses = 0;
let ties = 0;
let remainingRounds = 12;

function playGame(playerMove){

if(remainingRounds === 0){
    alert("Game Over!");
    return;
}

const randomNumber = Math.random();


if(randomNumber < 1/3){
    computerMove = 'Rock';
}
else if(randomNumber < 2/3){
    computerMove = 'Paper';
}
else{
    computerMove = 'Scissors';
}

let result = '';

if(playerMove === computerMove){
    result = 'Tie';
    ties++;
}
else if(
(playerMove === 'Rock' && computerMove === 'Scissors') ||
(playerMove === 'Paper' && computerMove === 'Rock') ||
(playerMove === 'Scissors' && computerMove === 'Paper')

){
    result = 'You Win';
    wins++;
}
else{
    result = 'You Lose';
    losses++;
}

remainingRounds--;

document.getElementById("score").innerText =
"Wins: " + wins + " | Losses: " + losses + " | Ties: " + ties;

document.getElementById("rounds").innerText =
"Remaining Rounds: " + remainingRounds;

alert("Player: " + playerMove +"\nComputer: " + computerMove +"\nResult: " + result);

}

</script>

}

}

}

#rounds{
margin-left:20px;
}

</style>

</body>
